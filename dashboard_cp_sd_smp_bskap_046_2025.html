let activeJenjang = 'sd';
let openCards = {};

function setJenjang(j) {
  activeJenjang = j;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['sd','smp','all'][i] === j);
  });
  document.getElementById('faseFilter').value = '';
  updateFaseOptions();
  renderCards();
}

function updateFaseOptions() {
  const sel = document.getElementById('faseFilter');
  const opts = sel.querySelectorAll('option');
  opts.forEach(o => {
    if (o.value === '') return;
    const f = o.value;
    if (activeJenjang === 'sd') {
      o.style.display = ['A','B','C'].includes(f) ? '' : 'none';
    } else if (activeJenjang === 'smp') {
      o.style.display = f === 'D' ? '' : 'none';
    } else {
      o.style.display = '';
    }
  });
}

function getFilteredData() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const faseF = document.getElementById('faseFilter').value;

  let pool = [];
  if (activeJenjang === 'sd') pool = CP_DATA.sd;
  else if (activeJenjang === 'smp') pool = CP_DATA.smp;
  else pool = [...CP_DATA.sd, ...CP_DATA.smp];

  return pool.map(m => {
    const fasesFiltered = m.fases.filter(f => {
      const faseMatch = !faseF || f.fase === faseF;
      const qMatch = !q || m.nama.toLowerCase().includes(q) || f.cp.toLowerCase().includes(q) || f.fase.toLowerCase().includes(q) || f.kelas.toLowerCase().includes(q);
      return faseMatch && qMatch;
    });
    if (fasesFiltered.length === 0) return null;
    return { ...m, fases: fasesFiltered };
  }).filter(Boolean);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Tersalin!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll() {
  const filtered = getFilteredData();
  let out = '';
  filtered.forEach(m => {
    out += `=== ${m.nama} ===\n`;
    m.fases.forEach(f => {
      out += `\n[Fase ${f.fase} — ${f.kelas}]\n${f.cp}\n`;
    });
    out += '\n';
  });
  const btn = document.getElementById('copyAllBtn');
  navigator.clipboard.writeText(out.trim()).then(() => {
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Semua tersalin!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Salin semua CP yang tampil';
      btn.classList.remove('copied');
    }, 2500);
  });
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = getFilteredData();

  document.getElementById('countInfo').textContent = `Menampilkan ${filtered.length} mata pelajaran`;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="ti ti-search" style="font-size:32px;display:block;margin-bottom:8px;" aria-hidden="true"></i>Tidak ada hasil ditemukan.</div>';
    return;
  }

  container.innerHTML = filtered.map(m => {
    const isOpen = openCards[m.id] || false;
    const faseBadges = [...new Set(m.fases.map(f => f.fase))].map(f => `<span class="mapel-fase-badge" style="background:${m.color};color:${m.iconColor};">Fase ${f}</span>`).join(' ');

    const faseItems = m.fases.map(f => `
      <div class="fase-item">
        <div class="fase-header">
          <span class="fase-label">Fase ${f.fase}</span>
          <span class="fase-kelas">${f.kelas}</span>
        </div>
        <div class="cp-text">${f.cp}</div>
        <button class="copy-btn" onclick="event.stopPropagation(); copyText(${JSON.stringify('Fase ' + f.fase + ' (' + f.kelas + ') — ' + m.nama + ':\n' + f.cp)}, this)">
          <i class="ti ti-copy" aria-hidden="true"></i> Salin CP ini
        </button>
      </div>
    `).join('');

    return `
      <div class="mapel-card" id="card-${m.id}">
        <div class="mapel-header" onclick="toggleCard('${m.id}')">
          <div class="mapel-title-row">
            <div class="mapel-icon" style="background:${m.color};">${m.icon}</div>
            <div>
              <div class="mapel-name">${m.nama}</div>
              <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">${faseBadges}</div>
            </div>
          </div>
          <i class="ti ti-chevron-down chevron ${isOpen ? 'open' : ''}" aria-hidden="true"></i>
        </div>
        <div class="fase-list ${isOpen ? 'show' : ''}" id="fase-${m.id}">
          ${faseItems}
          <button class="copy-all-btn" style="margin:4px 12px 4px;" onclick="copyMapelAll(${JSON.stringify(m.nama)}, ${JSON.stringify(m.fases)}, this)">
            <i class="ti ti-copy" aria-hidden="true"></i> Salin semua fase mapel ini
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function toggleCard(id) {
  openCards[id] = !openCards[id];
  const list = document.getElementById('fase-' + id);
  const chevron = document.querySelector(`#card-${id} .chevron`);
  list.classList.toggle('show', openCards[id]);
  chevron.classList.toggle('open', openCards[id]);
}

function copyMapelAll(nama, fases, btn) {
  event.stopPropagation();
  let out = `=== ${nama} ===\n`;
  fases.forEach(f => { out += `\n[Fase ${f.fase} — ${f.kelas}]\n${f.cp}\n`; });
  navigator.clipboard.writeText(out.trim()).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Tersalin!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}

updateFaseOptions();
renderCards();
</script>
